# Despliegue de la solución (se completa en PC4/TB2 según la arquitectura del enunciado:
# UI + Server API + Nodos + MongoDB + Redis). En PC3 solo se usa el servicio trainer.
services:
  trainer:
    build:
      context: ./go
      dockerfile: Dockerfile
    command: ["/app/trainer", "-datos", "/data/datos_limpios.csv", "-modelo", "/data/model.json"]
    volumes:
      - ./data:/data

